<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Настройка мастера</title>

<style>
@font-face {
    font-family: 'YankiFont';
    src: url("{{ url_for('static', filename='fonts/yaya.otf') }}");
}

body {
    margin: 0;
    background: url("{{ url_for('static', filename='images/sakura.png') }}");
    background-size: cover;
    font-family: Arial;
}

.overlay {
    min-height: 100vh;
    background: rgba(245,230,220,0.8);
    padding: 40px;
}

h1 {
    font-family: 'YankiFont';
    color: #850004;
}

form {
    max-width: 600px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input, textarea {
    padding: 10px;
    border: 2px solid #E47D7B;
    background: rgba(255,255,255,0.7);
}

button {
    background: #E47D7B;
    color: white;
    padding: 12px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="overlay">

<h1>Настройка профиля: {{ role }}</h1>

<form method="POST" action="/master/save">

    <input type="hidden" name="role" value="{{ role }}">

    <h3>Услуга</h3>

    <input type="text" name="service_title" placeholder="Название услуги">
    <textarea name="service_desc" placeholder="Описание"></textarea>
    <input type="number" name="service_price" placeholder="Цена">

    <button type="submit">Сохранить</button>

</form>

</div>

</body>
</html>
